<!doctype html>
<!-- PROTOTYPE — throwaway design exploration. Three variants of the portfolio
     landing page, switchable via ?variant= and the floating bottom bar.
     Run: python3 -m http.server 4317 --directory prototype  → http://localhost:4317 -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portfolio — design prototypes</title>
<style>
  html, body { margin: 0; height: 100%; }
  iframe { display: block; width: 100%; height: 100%; border: 0; }
  .proto-bar {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 4px;
    background: #111; color: #fff; border: 1px solid #444; border-radius: 999px;
    padding: 6px 10px; z-index: 9999;
    font: 12px/1 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    box-shadow: 0 4px 24px rgba(0,0,0,.45);
    user-select: none;
  }
  .proto-bar button {
    all: unset; cursor: pointer; padding: 4px 10px; border-radius: 999px; color: #fff;
  }
  .proto-bar button:hover { background: #333; }
  .proto-bar button:focus-visible { outline: 2px solid #fff; }
  .proto-bar .label { padding: 4px 8px; min-width: 180px; text-align: center; letter-spacing: .02em; }
</style>
</head>
<body>
<iframe id="frame" title="design variant"></iframe>
<nav class="proto-bar" aria-label="Prototype variant switcher">
  <button id="prev" aria-label="Previous variant">&#8592;</button>
  <span class="label" id="label"></span>
  <button id="next" aria-label="Next variant">&#8594;</button>
</nav>
<script>
  const VARIANTS = [
    { key: 'a', name: 'Terminal Archive' },
    { key: 'b', name: 'Editorial Ink' },
    { key: 'c', name: 'Swiss Poster' },
    { key: 'd', name: 'Phosphor Shell' },
    { key: 'e', name: 'Engineering Paper' },
    { key: 'f', name: 'Quiet Craft' },
    { key: 'g', name: 'Kinetic Type' },
    { key: 'h', name: 'Data Journal' },
    { key: 'i', name: 'Bauhaus' },
    { key: 'j', name: 'Riso Zine' },
    { key: 'k', name: 'SYNTH: Kinetic Terminal' },
    { key: 'l', name: 'SYNTH: Overprint Engine' },
  ];
  const frame = document.getElementById('frame');
  const label = document.getElementById('label');

  function current() {
    const key = new URLSearchParams(location.search).get('variant') || 'a';
    const idx = VARIANTS.findIndex(v => v.key === key);
    return idx === -1 ? 0 : idx;
  }
  function show(idx) {
    const v = VARIANTS[(idx + VARIANTS.length) % VARIANTS.length];
    history.replaceState(null, '', '?variant=' + v.key);
    frame.src = 'variant-' + v.key + '.html';
    label.textContent = v.key.toUpperCase() + ' — ' + v.name;
  }
  document.getElementById('prev').addEventListener('click', () => show(current() - 1));
  document.getElementById('next').addEventListener('click', () => show(current() + 1));

  function onKey(key, target) {
    if (target && target.closest && target.closest('input, textarea, [contenteditable]')) return;
    if (key === 'ArrowLeft') show(current() - 1);
    if (key === 'ArrowRight') show(current() + 1);
  }
  window.addEventListener('keydown', e => onKey(e.key, e.target));
  // variants forward their arrow-key presses, since focus usually sits inside the iframe
  window.addEventListener('message', e => { if (e.data && e.data.protoKey) onKey(e.data.protoKey, null); });

  show(current());
</script>
</body>
</html>
