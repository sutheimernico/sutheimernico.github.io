<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pitch prototypes — switcher</title>
<style>
  :root { --bg:#0E0F0D; --ink:#E8EAE3; --muted:#8A9184; --accent:#45E08A; --line:#262a22; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { background: var(--bg); font-family: ui-monospace, Menlo, Consolas, monospace; display: flex; flex-direction: column; }
  iframe { flex: 1; border: 0; width: 100%; }
  .bar {
    position: fixed; left: 50%; bottom: 14px; transform: translateX(-50%);
    display: flex; align-items: center; gap: 4px;
    background: rgba(14,15,13,.92); border: 1px solid var(--accent);
    box-shadow: 0 8px 30px rgba(0,0,0,.6); padding: 6px 8px; z-index: 99;
  }
  .bar button {
    background: none; border: 1px solid var(--line); color: var(--ink);
    font: inherit; font-size: 13px; padding: 4px 10px; cursor: pointer;
  }
  .bar button:hover { border-color: var(--accent); color: var(--accent); }
  .bar button:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .bar .label { color: var(--accent); font-size: 12px; letter-spacing: .08em; padding: 0 10px; min-width: 200px; text-align: center; }
  .bar a { color: var(--muted); font-size: 11px; padding: 0 8px; }
  .bar a:hover { color: var(--ink); }
</style>
</head>
<body>
<!-- PROTOTYPE switcher — throwaway. Cycles the five pitch prototypes via ?variant=. -->
<iframe id="frame" title="pitch prototype"></iframe>
<nav class="bar" aria-label="Prototype switcher">
  <button id="prev" aria-label="Previous variant">←</button>
  <span class="label" id="label"></span>
  <button id="next" aria-label="Next variant">→</button>
  <a id="standalone" href="#" target="_blank" rel="noopener">standalone ↗</a>
</nav>
<script>
  var variants = [
    { key: '01', file: '01-stratigraph.html',   name: 'Stratigraph (Descent 2.0)' },
    { key: '02', file: '02-pipeline.html',      name: 'The Pipeline' },
    { key: '03', file: '03-query-console.html', name: 'Query Console' },
    { key: '04', file: '04-annual-report.html', name: 'Annual Report' },
    { key: '05', file: '05-glyph-field.html',   name: 'Glyph Field' },
    { key: '06', file: '06-descent-pipeline.html', name: 'Descent × Pipeline (Fusion)' }
  ];
  var frame = document.getElementById('frame');
  var label = document.getElementById('label');
  var standalone = document.getElementById('standalone');

  function currentIndex() {
    var key = new URLSearchParams(location.search).get('variant') || '01';
    var i = variants.findIndex(function (v) { return v.key === key; });
    return i === -1 ? 0 : i;
  }
  function show(i) {
    var v = variants[(i + variants.length) % variants.length];
    var url = new URL(location.href);
    url.searchParams.set('variant', v.key);
    history.replaceState(null, '', url);
    frame.src = v.file;
    label.textContent = v.key + ' — ' + v.name;
    standalone.href = v.file;
    document.title = v.key + ' ' + v.name + ' — pitch prototypes';
  }
  document.getElementById('prev').addEventListener('click', function () { show(currentIndex() - 1); });
  document.getElementById('next').addEventListener('click', function () { show(currentIndex() + 1); });
  document.addEventListener('keydown', function (e) {
    var t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
    if (e.key === 'ArrowLeft') show(currentIndex() - 1);
    if (e.key === 'ArrowRight') show(currentIndex() + 1);
  });
  show(currentIndex());
</script>
</body>
</html>
